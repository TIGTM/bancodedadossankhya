<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sankhya Database Studio</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <!-- SheetJS CDN para Exportar Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a; /* Slate 900 */
            --glass-bg: rgba(30, 41, 59, 0.7); /* Slate 800 */
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6; /* Blue 500 */
            --primary-hover: #2563eb; /* Blue 600 */
            --text-main: #f8fafc; /* Slate 50 */
            --text-muted: #94a3b8; /* Slate 400 */
            --accent: #10b981; /* Emerald 500 */
            --danger: #ef4444; /* Red 500 */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: white;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
            background: rgba(15, 23, 42, 0.5);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            border: 1px solid var(--glass-border);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* Main Workspace */
        main {
            flex: 1;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            height: calc(100vh - 73px);
            overflow: hidden;
        }

        /* Editor Section */
        .editor-section {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 250px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .editor-header {
            padding: 0.75rem 1rem;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .editor-title {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .run-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1.25rem;
            border-radius: 6px;
            font-weight: 500;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
        }

        .run-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 8px -1px rgba(59, 130, 246, 0.4);
        }

        .run-btn:active {
            transform: translateY(0);
        }

        textarea {
            width: 100%;
            flex: 1;
            background: transparent;
            border: none;
            padding: 1rem;
            color: var(--text-main);
            font-family: 'Fira Code', monospace;
            font-size: 0.95rem;
            resize: none;
            outline: none;
            line-height: 1.5;
        }

        textarea::placeholder {
            color: rgba(148, 163, 184, 0.3);
        }

        .export-btn {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .export-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .export-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .export-icon {
            width: 14px;
            height: 14px;
        }

        /* Results Section */
        .results-section {
            flex: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .results-header {
            padding: 0.75rem 1rem;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .results-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .results-stats {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .table-container {
            flex: 1;
            overflow: auto;
            position: relative;
        }

        /* Loading State */
        .loader-container {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(4px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        
        .loader-container.active {
            display: flex;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(59, 130, 246, 0.3);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            position: sticky;
            top: 0;
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(8px);
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--glass-border);
            z-index: 1;
        }

        td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.875rem;
            white-space: nowrap;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.03);
        }

        /* Empty / Error States */
        .message-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            text-align: center;
            padding: 2rem;
        }

        .message-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .message-state.error {
            color: var(--danger);
        }
        
        .message-state.error svg {
            opacity: 1;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Botão Cancelar Consulta */
        .cancel-btn {
            background: rgba(239, 68, 68, 0.15);
            color: #ff8080;
            border: 1px solid rgba(239, 68, 68, 0.4);
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            backdrop-filter: blur(4px);
        }

        .cancel-btn:hover {
            background: rgba(239, 68, 68, 0.3);
            border-color: #ef4444;
            color: white;
            transform: translateY(-2px);
        }

        .cancel-btn svg {
            width: 14px;
            height: 14px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <div class="logo-icon">S</div>
            <h1>Sankhya Database Studio</h1>
        </div>
        <div class="status-badge">
            <div class="status-dot"></div>
            Online & Integrado via Proxy API
        </div>
    </header>

    <main>
        <!-- Editor -->
        <div class="editor-section">
            <div class="editor-header">
                <div class="editor-title">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"></polyline><polyline points="20 10 14 10 14 4"></polyline><line x1="14" y1="10" x2="21" y2="3"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>
                    SQL Query (Microsoft SQL Server Syntax)
                </div>
                <button class="run-btn" id="runBtn" onclick="executeSQL()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    Executar (F5)
                </button>
            </div>
            <textarea id="sqlInput" spellcheck="false" placeholder="SELECT TOP 100 * FROM TGFCAB"></textarea>
        </div>

        <!-- Resultados -->
        <div class="results-section">
            <div class="results-header">
                <div class="editor-title">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                    Resultados
                </div>
                <div class="results-actions">
                    <button class="export-btn" id="btnCsv" onclick="exportData('csv')" disabled>
                        <svg class="export-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                        CSV
                    </button>
                    <button class="export-btn" id="btnExcel" onclick="exportData('xlsx')" disabled>
                        <svg class="export-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><path d="M8 13h2v4H8z"></path><path d="M16 13h-2v4h2z"></path></svg>
                        Excel
                    </button>
                    <div class="results-stats" id="statsText">0 linhas</div>
                </div>
            </div>
            
            <div class="table-container" id="tableContainer">
                <div class="message-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <p>Digite uma query SQL acima e clique em Executar para ver os dados.</p>
                </div>
            </div>

            <!-- Loader Overlay -->
            <div class="loader-container" id="loader">
                <div class="spinner"></div>
                <p id="loaderText">Consultando banco Sankhya...</p>
                <button class="cancel-btn" id="cancelBtn" onclick="cancelSQL()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    Interromper Consulta
                </button>
            </div>
        </div>
    </main>

    <script>
        // --- 🔒 AUTENTICAÇÃO E CONTROLE ---
        let apiToken = localStorage.getItem('sankhya_api_token');
        let currentAbortController = null;
        let currentData = null; // Armazena os dados atuais da tela para exportação

        if (!apiToken) {
            trancarEAutenticar();
        }

        function cancelSQL() {
            if (currentAbortController) {
                console.warn("🛑 Usuário solicitou interrupção da consulta.");
                currentAbortController.abort();
                currentAbortController = null;
            }
        }

        function trancarEAutenticar() {
            apiToken = prompt("🔒 ACESSO RESTRITO\n\nPor favor, digite o Token de Segurança (API_TOKEN) para liberar o Studio:");
            if (apiToken) {
                localStorage.setItem('sankhya_api_token', apiToken);
            } else {
                alert("O acesso ficará bloqueado sem a senha.");
            }
        }
        // ------------------------

        // Atalho F5 para executar
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F5' || (e.ctrlKey && e.key === 'Enter')) {
                e.preventDefault();
                executeSQL();
            }
        });

        async function executeSQL() {
            const sql = document.getElementById('sqlInput').value.trim();
            if (!sql) return;

            const container = document.getElementById('tableContainer');
            const loader = document.getElementById('loader');
            const stats = document.getElementById('statsText');
            const btn = document.getElementById('runBtn');

            // UI estado de loading
            loader.classList.add('active');
            btn.disabled = true;
            btn.style.opacity = '0.7';
            document.getElementById('btnCsv').disabled = true;
            document.getElementById('btnExcel').disabled = true;

            // Prepara cancelamento
            currentAbortController = new AbortController();

            try {
                if (!apiToken) {
                    trancarEAutenticar();
                    if (!apiToken) throw new Error("Ação cancelada: Token não informado.");
                }

                const response = await fetch('/sql', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-api-key': apiToken
                    },
                    body: JSON.stringify({ query: sql }),
                    signal: currentAbortController.signal
                });

                const data = await response.json();

                if (response.status === 401) {
                    localStorage.removeItem('sankhya_api_token');
                    apiToken = null;
                    throw new Error("🔒 Acesso Negado: A senha fornecida está incorreta!");
                }
                
                if (!response.ok) {
                    throw new Error(data.erro || 'Erro desconhecido HTTP ' + response.status);
                }
                
                currentData = data; // Salva globalmente para export

                renderTable(data);
                stats.innerText = `${data.length} linha(s) retornada(s)`;
                
                if (data.length > 0) {
                    document.getElementById('btnCsv').disabled = false;
                    document.getElementById('btnExcel').disabled = false;
                }

            } catch (err) {
                if (err.name === 'AbortError') {
                    container.innerHTML = `
                        <div class="message-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
                            <p style="font-weight: 600">Consulta interrompida</p>
                            <p style="font-size: 0.875rem; opacity: 0.8">Você cancelou a execução do comando SQL.</p>
                        </div>
                    `;
                    stats.innerText = `Cancelado`;
                    return;
                }

                console.error(err);
                container.innerHTML = `
                    <div class="message-state error">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                        <p style="font-weight: 600; margin-bottom: 0.5rem">Erro na consulta</p>
                        <p style="font-size: 0.875rem; opacity: 0.8; max-width: 80%; word-break: break-all;">${err.message}</p>
                    </div>
                `;
                stats.innerText = `Erro`;
            } finally {
                loader.classList.remove('active');
                btn.disabled = false;
                btn.style.opacity = '1';
                currentAbortController = null;
            }
        }

        function renderTable(data) {
            const container = document.getElementById('tableContainer');
            
            if (!Array.isArray(data) || data.length === 0) {
                container.innerHTML = `
                    <div class="message-state">
                        <p>Query executada com sucesso, mas retornou 0 linhas.</p>
                    </div>
                `;
                return;
            }

            // Pega as colunas do primeiro registro
            const columns = Object.keys(data[0]);

            let html = '<table><thead><tr>';
            columns.forEach(col => {
                html += `<th>${col}</th>`;
            });
            html += '</tr></thead><tbody>';

            data.forEach(row => {
                html += '<tr>';
                columns.forEach(col => {
                    // Trata nulos e formatação básica
                    let val = row[col];
                    if (val === null || val === undefined) val = '<span style="opacity:0.3; font-style:italic">NULL</span>';
                    html += `<td>${val}</td>`;
                });
                html += '</tr>';
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function exportData(format) {
            if (!currentData || currentData.length === 0) return;
            
            // Usando SheetJS (XLSX)
            const worksheet = XLSX.utils.json_to_sheet(currentData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Dados");
            
            const timestamp = new Date().toISOString().replace(/T/, '_').replace(/:/g, '-').slice(0,19);
            const fileName = `Extracao_Sankhya_${timestamp}.${format}`;
            
            XLSX.writeFile(workbook, fileName);
        }
    </script>
</body>
</html>
